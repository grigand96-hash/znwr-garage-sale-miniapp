# /etc/nginx/sites-available/znwr-sale  (symlink into sites-enabled)
# Standalone vhost for sale.pad.team — never touches the leon config, so a
# mistake here cannot break leon.pad.team for other clients.
# TLS block (listen 443 + certs) is added automatically by:
#   certbot --nginx -d sale.pad.team
server {
    server_name sale.pad.team;

    # Small JSON bodies only.
    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    listen 80;
}

# Optional edge rate-limit (per-IP) — the app already limits per-identity.
# To enable, drop this zone into /etc/nginx/conf.d/znwr-sale-rl.conf (http ctx)
# and add `limit_req zone=salereq burst=60 nodelay;` inside the location above:
#   limit_req_zone $binary_remote_addr zone=salereq:10m rate=30r/s;
